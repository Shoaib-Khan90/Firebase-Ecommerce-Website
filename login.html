
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heritage Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="auth-container">
    <h2 class="auth-title">Heritage Login</h2>

    <form id="loginForm" class="auth-form">

      <div class="input-group">
        <label class="input-label">Email</label>
        <input type="email" id="loginEmail" class="input-field" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="loginPassword" class="input-field" placeholder="Enter your password">
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">Login</button>

    </form>

    <p id="messageText" class="message"></p>

    <div class="auth-footer">
      Don't have an account?
      <a href="signup.html" class="link">Sign Up</a>
    </div>
  </div>

  <script src="login.js" type="module"></script>

</body>
</html>
